spring.application.name=payment-service
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/bd_ecommerce
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

spring.kafka.bootstrap-servers=localhost:9092

kafka.topics.order-created=order.created
kafka.topics.payment-completed=payment.completed
kafka.topics.payment-failed=payment.failed
kafka.consumer.group-id=payment-service-group

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true