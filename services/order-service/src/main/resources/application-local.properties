spring.application.name=order-service
server.port=8082

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/bd_ecommerce
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Url microservice product-service
services.product.url=http://localhost:0909

# Kafka
#Estan en yaml= spring.kafka.bootstrap-servers=localhost:9092

# Kafka Topics
#Estan en yaml= kafka.topics.order-created=order.created
#Estan en yaml= kafka.topics.order-status-changed=order.status.changed

kafka.topics.payment-completed=payment.completed
kafka.topics.payment-failed=payment.failed

# Consumer
kafka.consumer.group-id=order-service-group

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
