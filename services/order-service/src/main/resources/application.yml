services:
  product:
    url: http://localhost:8761  # o el nombre del servicio en Eureka/Docker

feign:
  client:
    config:
      product-service:
        connectTimeout: 3000
        readTimeout: 5000
spring:
  kafka:
    bootstrap-servers: localhost:9092

kafka:
  topics:
    order-created: order.created
    order-status-changed: order.status.changed