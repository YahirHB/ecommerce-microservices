spring:
  application:
    name: order-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Todo lo que sigue está dentro de 'spring'
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bd_ecommerce}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}

# ESTOS DEBEN ESTAR AL MISMO NIVEL QUE 'spring:'
server:
  port: ${SERVER_PORT:8082}

services:
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:0909}
  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8083}

kafka:
  topics:
    order-pending: ${KAFKA_TOPIC_ORDER_PENDING:order.pending}
    order-status-changed: ${KAFKA_TOPIC_ORDER_STATUS_CHANGED:order.status.changed}
    payment-completed: ${KAFKA_TOPIC_PAYMENT_COMPLETED:payment.completed}
    payment-failed: ${KAFKA_TOPIC_PAYMENT_FAILED:payment.failed}
  consumer:
    group-id: ${KAFKA_CONSUMER_GROUP_ID:order-service-group}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true